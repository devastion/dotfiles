packages:
  darwin:
    brews:
      - "bash-completion@2"
      - "coreutils"
      - "exiftool"
      - "felixkratz/formulae/borders"
      - "gnupg"
      - "less"
      - "lesspipe"
    casks:
      - "font-maple-mono-normal-nf"
      - "ghostty"
      - "nikitabobko/tap/aerospace"
      - "spotify"
  linux:
    apt:
      # build tools
      - "build-essential"
      - "cmake"
      - "pkg-config"
      # core utilities
      - "curl"
      - "file"
      - "git"
      - "gpg"
      - "less"
      - "tar"
      - "unzip"
      - "wget"
      - "xclip"
      - "xdg-utils"
      - "zip"
      # shell
      - "zsh"
      - "bash"
      # libraries (needed by mise-managed tools, lua, python, etc.)
      - "libbz2-dev"
      - "libevent-dev"
      - "libffi-dev"
      - "libimage-exiftool-perl"
      - "libncurses-dev"
      - "libreadline-dev"
      - "libsqlite3-dev"
      - "libssl-dev"
      - "zlib1g-dev"
      # misc
      - "ca-certificates"
      - "locales"
      - "bash-completion"
